<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brave MCP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #ffe8d6, transparent 40%),
          linear-gradient(180deg, #f7f3eb 0%, #f2eee6 100%);
        color: #182022;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 64px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 40px;
        letter-spacing: -0.04em;
      }

      p {
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 16px;
        margin-top: 32px;
        padding: 24px;
        border: 1px solid rgba(24, 32, 34, 0.12);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 14px 40px rgba(24, 32, 34, 0.08);
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid rgba(24, 32, 34, 0.15);
        border-radius: 12px;
        font: inherit;
      }

      button {
        width: fit-content;
        padding: 12px 18px;
        border: 0;
        border-radius: 999px;
        background: #e15200;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      #status {
        min-height: 1.5em;
        color: #4b5b61;
      }

      pre {
        margin: 0;
        padding: 18px;
        border-radius: 16px;
        background: rgba(24, 32, 34, 0.92);
        color: #f8f1e6;
        font: 13px/1.5 "SF Mono", "Menlo", monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brave MCP</h1>
      <p>Configure the local daemon connection for the Brave background worker.</p>
      <form id="settings-form">
        <label>
          Daemon WebSocket URL
          <input id="daemon-url" type="url" placeholder="ws://127.0.0.1:39200/extension/connect" />
        </label>
        <label>
          Auth Token
          <input id="auth-token" type="password" placeholder="Paste the daemon secret here" />
        </label>
        <div class="actions">
          <button type="submit">Save Connection</button>
          <button id="reconnect-button" type="button">Reconnect Now</button>
        </div>
        <pre id="bridge-status">Loading bridge status...</pre>
        <p id="status"></p>
      </form>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
